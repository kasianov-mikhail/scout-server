openapi: 3.1.0
info:
  title: Scout Server
  version: 1.0.0
  summary: CloudKit-compatible analytics sync and query API.
  description: |
    The HTTP API for the Scout analytics package. Clients upload raw records and
    query them back; the matrix record types Scout's UI reads
    (`DateIntMatrix`, `DateDoubleMatrix`, `PeriodMatrix`) are synthesized
    server-side by SQL aggregation rather than stored. Every endpoint requires
    an API key, passed either as an `X-API-Key` header or a bearer token.
servers:
  - url: /api/v1
    description: Versioned, API-key-protected root.
security:
  - ApiKeyHeader: []
  - BearerToken: []
paths:
  /records:
    post:
      operationId: createRecords
      summary: Upsert a batch of records.
      description: |
        Upserts records keyed by `recordName`, mirroring CloudKit's
        `savePolicy: .allKeys` so sync retries stay idempotent. At most 1000
        records per request. Matrix record types are rejected — they are
        derived, not stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteRequest'
      responses:
        '200':
          description: The batch was upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
  /records/query:
    post:
      operationId: queryRecords
      summary: Query records, the counterpart of CKQuery.
      description: |
        Filters and sorts raw records, or synthesizes a matrix record type by
        aggregation. The response carries `records` and an opaque `cursor` when
        more pages remain; pass `cursor` back to continue. Either `recordType`
        (a fresh query) or `cursor` (a continuation) must be present.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: A page of matching records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /records/{recordName}:
    get:
      operationId: getRecord
      summary: Fetch a single record by name.
      description: CloudKit's `lookup`, with an optional projection.
      parameters:
        - name: recordName
          in: path
          required: true
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Comma-separated projection; omitting it keeps every field.
          schema:
            type: string
      responses:
        '200':
          description: The record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /metrics/active-users:
    get:
      operationId: getActiveUsers
      summary: Pre-aggregated DAU/WAU/MAU series.
      description: |
        One point per UTC day over the half-open `[from, to)` range, each an
        as-of trailing distinct-install count over the day (`dau`), 7 days
        (`wau`), and calendar month (`mau`).
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive lower bound, ms since the Unix epoch. Defaults to 90 days before `to`.
          schema:
            type: integer
            format: int64
        - name: to
          in: query
          required: false
          description: Exclusive upper bound, ms since the Unix epoch. Defaults to now.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The active-user series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    BearerToken:
      type: http
      scheme: bearer
  responses:
    BadRequest:
      description: The request was malformed.
    Unauthorized:
      description: Missing or invalid API key.
    NotFound:
      description: No record with that name.
    PayloadTooLarge:
      description: The batch exceeded the per-request limit.
  schemas:
    FieldValue:
      description: |
        A typed record field value, encoded as a single-key object, e.g.
        `{"string": "login"}` or `{"date": 1718000000000}`. Dates are integer
        milliseconds since the Unix epoch; bytes are base64.
      oneOf:
        - $ref: '#/components/schemas/StringValue'
        - $ref: '#/components/schemas/IntValue'
        - $ref: '#/components/schemas/DoubleValue'
        - $ref: '#/components/schemas/DateValue'
        - $ref: '#/components/schemas/BytesValue'
        - $ref: '#/components/schemas/StringsValue'
    StringValue:
      type: object
      additionalProperties: false
      required: [string]
      properties:
        string:
          type: string
    IntValue:
      type: object
      additionalProperties: false
      required: [int]
      properties:
        int:
          type: integer
          format: int64
    DoubleValue:
      type: object
      additionalProperties: false
      required: [double]
      properties:
        double:
          type: number
          format: double
    DateValue:
      type: object
      additionalProperties: false
      required: [date]
      properties:
        date:
          type: integer
          format: int64
          description: Milliseconds since the Unix epoch.
    BytesValue:
      type: object
      additionalProperties: false
      required: [bytes]
      properties:
        bytes:
          type: string
          description: Base64-encoded data.
    StringsValue:
      type: object
      additionalProperties: false
      required: [strings]
      properties:
        strings:
          type: array
          items:
            type: string
    Record:
      type: object
      required: [recordType, recordName, fields]
      properties:
        recordType:
          type: string
        recordName:
          type: string
        fields:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FieldValue'
    WriteRequest:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/Record'
    WriteResponse:
      type: object
      required: [saved]
      properties:
        saved:
          type: integer
    QueryFilter:
      type: object
      required: [field, op, value]
      properties:
        field:
          type: string
        op:
          type: string
          enum:
            - equals
            - notEquals
            - greaterThan
            - greaterThanOrEquals
            - lessThan
            - lessThanOrEquals
            - in
            - beginsWith
        value:
          $ref: '#/components/schemas/FieldValue'
    QuerySort:
      type: object
      required: [field]
      properties:
        field:
          type: string
        ascending:
          type: boolean
          default: true
    QueryRequest:
      type: object
      properties:
        recordType:
          type: string
        filters:
          type: array
          items:
            $ref: '#/components/schemas/QueryFilter'
        sort:
          type: array
          items:
            $ref: '#/components/schemas/QuerySort'
        limit:
          type: integer
        fields:
          type: array
          items:
            type: string
        cursor:
          type: string
    QueryResponse:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/Record'
        cursor:
          type: string
    ActiveUserPoint:
      type: object
      required: [date, dau, wau, mau]
      properties:
        date:
          type: integer
          format: int64
          description: UTC midnight of the day, ms since the Unix epoch.
        dau:
          type: integer
        wau:
          type: integer
        mau:
          type: integer
    ActiveUsersResponse:
      type: object
      required: [series]
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/ActiveUserPoint'
