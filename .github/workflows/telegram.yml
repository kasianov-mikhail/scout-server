name: Telegram

# Telegram alerts for scout-server. Same "quiet" policy as the scout repo: green
# CI is never announced and failures notify only on main. The message-delivery
# step is the shared composite action that lives in the scout repo, so both
# repositories format and send messages the same way.
#
#   CI failed (main)        -> loud   ❌ CI failed
#   Docker failed (main)    -> loud   ❌ Deploy failed   (build/publish/SSH deploy)
#   Docker succeeded (main) -> silent 📦 Deployed
on:
  workflow_run:
    workflows: [CI, Docker]
    types: [completed]

permissions:
  contents: read

jobs:
  ci-failure:
    if: >
      github.event.workflow_run.name == 'CI' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build message
        id: build
        env:
          WORKFLOW: ${{ github.event.workflow_run.name }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          esc() { printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          text="$(printf '<b>❌ CI failed — scout-server</b>\n<pre>Check:   %s\nBranch:  main (%s)\nBy:      @%s</pre>\n<a href="%s">Open run →</a>' \
            "$(esc "$WORKFLOW")" "$(esc "${SHA:0:7}")" "$(esc "$ACTOR")" "$URL")"
          { echo 'text<<EOF'; echo "$text"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - uses: kasianov-mikhail/scout/.github/actions/telegram-notify@main
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          text: ${{ steps.build.outputs.text }}
          silent: "false"

  deploy-failure:
    if: >
      github.event.workflow_run.name == 'Docker' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build message
        id: build
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          esc() { printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          text="$(printf '<b>❌ Deploy failed — scout-server</b>\n<pre>Commit:  main (%s)</pre>\n<a href="%s">Open run →</a>' \
            "$(esc "${SHA:0:7}")" "$URL")"
          { echo 'text<<EOF'; echo "$text"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - uses: kasianov-mikhail/scout/.github/actions/telegram-notify@main
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          text: ${{ steps.build.outputs.text }}
          silent: "false"

  deployed:
    if: >
      github.event.workflow_run.name == 'Docker' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build message
        id: build
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          esc() { printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          text="$(printf '<b>📦 Deployed — scout-server</b>\n<pre>Commit:  main (%s)\nImage:   ghcr.io/kasianov-mikhail/scout-server:latest</pre>\n<a href="%s">Open run →</a>' \
            "$(esc "${SHA:0:7}")" "$URL")"
          { echo 'text<<EOF'; echo "$text"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - uses: kasianov-mikhail/scout/.github/actions/telegram-notify@main
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          text: ${{ steps.build.outputs.text }}
          silent: "true"
