name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded pull request runs, but let pushes to main finish: a
# cancelled job skips the cache-save post step, so aborting main runs would
# leave the SwiftPM cache stale and every later build cold.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Swift version is part of the key: build artifacts produced by a
      # different compiler poison incremental builds with bogus module
      # visibility errors.
      - name: Swift version
        id: swift
        run: echo "version=$(swift --version | head -1 | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ steps.swift.outputs.version }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ steps.swift.outputs.version }}-

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --skip-build
